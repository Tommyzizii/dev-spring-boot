<html xmlns="http://www.w3.org/1999/xhtml"
      lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<body>
<section th:replace="fragments/header :: header"/>
<section layout:fragment="content">
    <div th:text="${message}">
        New Book has been added
    </div>
    <a href="/books/new" class="btn btn-primary">Add Book</a>
    <table class="table table-striped">
        <thead>
        <th>Author</th>
        <th>Title</th>
        <th>Year</th>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.author}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.year}"></td>
            <td>
                <a class="btn btn-primary" th:href="@{/books/edit/{id}(id=${book.id})}">
                    Edit
                </a>
                &nbsp;
                <a class="btn btn-primary" th:href="@{/books/delete/{id}(id=${book.id})}">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
